{% for lot in lots %}
  <tr>
    <td style="color:var(--muted)">{{ lot.pk }}</td>
    <td><span class="lot-code">{{ lot.code }}</span></td>
    <td>{{ lot.get_status_display }}</td>
    <td>
      <span class="badge {% if lot.disposition == "In bond" %}bond{% endif %}">{{ lot.disposition }}</span>
    </td>
    <td class="muted">{{ lot.location }}</td>
    <td><a class="btn ghost sm" href="{% url 'lot-detail' lot.pk %}">Open</a></td>
  </tr>
{% empty %}
  <tr><td colspan="6"><div class="empty">No lots match these filters.</div></td></tr>
{% endfor %}
